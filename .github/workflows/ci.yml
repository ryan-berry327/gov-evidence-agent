# CI: runs on every push and pull request. No secrets, no cloud — the test suite
# and the retrieval eval gate both run on the local stack (hashing embedder, fake
# LLM), so every PR is validated for free. Kept separate from deploy, which only
# runs on main.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what tests need; skip the heavy Azure monitoring extras.
          pip install anthropic numpy pydantic pydantic-settings python-dotenv \
                      fastapi "uvicorn[standard]" httpx pytest pytest-asyncio

      - name: Run unit + integration tests
        run: python -m pytest tests/ -v

      - name: Retrieval eval quality gate
        # Fails the build if retrieval quality regresses (see tests/test_eval_gate.py).
        run: |
          python -m app.eval.run
          python -m pytest tests/test_eval_gate.py -v
