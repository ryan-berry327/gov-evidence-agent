# Deploy: runs only on push to main, after the gate job re-runs the CI checks.
# Pipeline: build the image (tagged with the git SHA) -> push to ACR ->
# terraform apply to roll out the new image.
#
# Secrets come from GitHub Actions secrets:
#  - AZURE_CREDENTIALS : service principal for azure/login
#  - ACR_NAME          : container registry name
#  - ANTHROPIC_API_KEY : passed to Terraform, injected as a container env var
#
# TODO: add a manual approval environment for prod and a post-deploy smoke test
# before shifting all traffic.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Re-run the CI checks as a gate before anything is built or deployed.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install anthropic numpy pydantic pydantic-settings python-dotenv \
                      fastapi "uvicorn[standard]" httpx pytest pytest-asyncio
      - run: python -m pytest tests/ -q
      - run: python -m pytest tests/test_eval_gate.py -q

  deploy:
    needs: gate # only deploy if the gate job passed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/gov-evidence-agent:${{ github.sha }}"
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="image=${{ env.IMAGE }}" \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Output app URL
        working-directory: infra
        run: terraform output app_url
